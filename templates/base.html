<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}ShopHub{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold fs-3 text-primary"
           href="/">
           ShopHub
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <form class="d-flex mx-auto w-50">
                <input class="form-control"
                       placeholder="Search products...">
            </form>

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-heart"></i>
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-cart3"></i>
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-primary ms-2">
                        Login
                    </a>
                </li>

            </ul>

        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

<footer class="bg-dark text-light mt-5">
    <div class="container py-5">

        <div class="row">

            <div class="col-md-4">
                <h4 class="fw-bold">ShopHub</h4>
                <p class="text-light-emphasis">
                    Your one-stop destination for quality products at affordable prices.
                </p>
            </div>

            <div class="col-md-2">
                <h6 class="fw-bold">Shop</h6>
                <ul class="list-unstyled">
                    <li><a href="#" class="footer-link">Products</a></li>
                    <li><a href="#" class="footer-link">Categories</a></li>
                    <li><a href="#" class="footer-link">Deals</a></li>
                </ul>
            </div>

            <div class="col-md-2">
                <h6 class="fw-bold">Company</h6>
                <ul class="list-unstyled">
                    <li><a href="#" class="footer-link">About</a></li>
                    <li><a href="#" class="footer-link">Contact</a></li>
                    <li><a href="#" class="footer-link">Careers</a></li>
                </ul>
            </div>

            <div class="col-md-4">
                <h6 class="fw-bold">Newsletter</h6>

                <form class="d-flex">
                    <input
                        type="email"
                        class="form-control me-2"
                        placeholder="Your email">

                    <button class="btn btn-primary">
                        Subscribe
                    </button>
                </form>

                <div class="mt-3">

                    <a href="#" class="social-icon">
                        <i class="bi bi-facebook"></i>
                    </a>

                    <a href="#" class="social-icon">
                        <i class="bi bi-instagram"></i>
                    </a>

                    <a href="#" class="social-icon">
                        <i class="bi bi-twitter-x"></i>
                    </a>

                    <a href="#" class="social-icon">
                        <i class="bi bi-youtube"></i>
                    </a>

                </div>
            </div>

        </div>

        <hr>

        <div class="text-center text-light-emphasis">
            © 2026 ShopHub. All rights reserved.
        </div>

    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
